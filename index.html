<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lostmary Đảo Thiên Đường - Sự Kiện Hộp Quà</title>
    <style>
        /* Nền biển/đảo nhiệt đới đẹp mắt */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1353&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-blend-mode: overlay;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        h1 {
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            text-align: center;
            font-size: 2rem;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.65);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Lưới 20 hộp quà */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            max-width: 700px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Hiệu ứng lật hộp 3D */
        .box-wrapper {
            perspective: 1000px;
            aspect-ratio: 1;
            cursor: pointer;
        }

        .box-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box-wrapper.opened .box-card {
            transform: rotateY(180deg);
        }

        .box-front, .box-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* Mặt trước: Hộp quà có số thứ tự tự động */
        .box-front {
            background: linear-gradient(135deg, #ff5252 0%, #c62828 100%);
            border: 3px solid #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
            flex-direction: column;
            gap: 5px;
        }

        .box-front::before {
            content: "🎁";
            font-size: 1.8rem;
        }

        /* Mặt sau: Phần thưởng bên trong */
        .box-back {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            transform: rotateY(180deg);
            font-size: 0.95rem;
            font-weight: bold;
            flex-direction: column;
            padding: 8px;
            text-align: center;
            box-sizing: border-box;
            justify-content: center;
            border: 3px solid #fff;
        }

        .box-back .icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .box-back .points-label {
            font-size: 0.85rem;
            color: #e65100;
            margin-top: 3px;
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .disabled {
            opacity: 0.5;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body>

    <h1>🏝️ Lostmary Đảo Thiên Đường 🏝️</h1>
    <div class="subtitle">Sự Kiện Hộp Quà May Mắn</div>
    
    <div class="status-panel">
        <div id="user-status">Đang định danh người chơi...</div>
        <div id="game-message" style="margin-top: 8px; font-weight: bold; color: #ffeb3b;">Hãy chọn 1 hộp quà may mắn của bạn!</div>
    </div>

    <div class="grid-container" id="grid"></div>

    <script>
        function playOpenSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(155, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(310, ctx.currentTime + 0.1);
                gain1.gain.setValueAtTime(0.5, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.1);

                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(650, ctx.currentTime);
                    osc2.frequency.setValueAtTime(950, ctx.currentTime + 0.08);
                    osc2.frequency.setValueAtTime(1250, ctx.currentTime + 0.15);
                    gain2.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.3);
                }, 50);
            } catch(e) { console.log(e); }
        }
    </script>

    <script>
        // Danh sách chính xác 20 phần quà theo yêu cầu của bạn
        const baseRewards = [
            { text: "Đại Cát Đại Lợi", points: "+500đ", icon: "👑", color: "#fff9c4" },
            { text: "May Mắn Lớn", points: "+500đ", icon: "👑", color: "#fff9c4" },
            
            { text: "Tiền Vào Như Nước", points: "+300đ", icon: "💰", color: "#e8f5e9" },
            { text: "Tài Lộc Đến", points: "+300đ", icon: "💰", color: "#e8f5e9" },
            { text: "Phát Tài", points: "+300đ", icon: "💰", color: "#e8f5e9" },
            
            { text: "Hố Sụt Điểm", points: "-200đ", icon: "💥", color: "#ffebee" },
            { text: "Gặp Nạn", points: "-200đ", icon: "💥", color: "#ffebee" },
            { text: "Vận Đen", points: "-200đ", icon: "💥", color: "#ffebee" },
            
            { text: "Hao Tài", points: "-100đ", icon: "📉", color: "#fff3e0" },
            { text: "Rơi Tiền", points: "-100đ", icon: "📉", color: "#fff3e0" },
            { text: "Trừ Nhẹ", points: "-100đ", icon: "📉", color: "#fff3e0" },
            { text: "Xui Xẻo", points: "-100đ", icon: "📉", color: "#fff3e0" },
            
            { text: "Đạo Tặc", points: "Cướp 200đ từ 1 team tự chọn", icon: "🥷", color: "#f3e5f5" },
            { text: "Bàn Tay Sắt", points: "Cướp 200đ từ 1 team tự chọn", icon: "🥷", color: "#f3e5f5" },
            { text: "Chiếm Đoạt", points: "Cướp 200đ từ 1 team tự chọn", icon: "🥷", color: "#f3e5f5" },
            
            { text: "Nhà Từ Thiện", points: "Cho 1 team tự chọn 200đ của đội mình", icon: "🎁", color: "#e0f2f1" },
            { text: "Sứ Giả Hòa Bình", points: "Cho 1 team tự chọn 200đ của đội mình", icon: "🎁", color: "#e0f2f1" },
            { text: "Tặng Quà", points: "Cho 1 team tự chọn 200đ của đội mình", icon: "🎁", color: "#e0f2f1" },
            
            { text: "Gậy Ông Đập Lưng Ông", points: "Đổi điểm của team mình cho 1 team bất kì (tự chọn)", icon: "🔄", color: "#e1f5fe" },
            { text: "Hoán Đổi Vận Mệnh", points: "Đổi điểm của team mình cho 1 team bất kì (tự chọn)", icon: "🔄", color: "#e1f5fe" }
        ];

        // Hàm xáo trộn phần thưởng ngẫu nhiên mỗi lần tải trang
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Tạo danh sách quà xáo trộn hoàn toàn ngẫu nhiên
        const activeRewards = shuffleArray([...baseRewards]);

        // Quản lý định danh người chơi trên iPad/Điện thoại
        const userId = localStorage.getItem('lostmary_event_v2_uid') || 'TEAM_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('lostmary_event_v2_uid', userId);
        
        const hasOpenedIndex = localStorage.getItem('lostmary_event_v2_opened');
        const grid = document.getElementById('grid');
        const userStatusText = document.getElementById('user-status');
        const gameMessage = document.getElementById('game-message');

        userStatusText.innerHTML = `Mã thiết bị của bạn: <strong style="color: #00f2fe;">${userId}</strong>`;

        // Tạo 20 ô giao diện
        activeRewards.forEach((reward, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'box-wrapper';
            wrapper.dataset.index = index;

            // Kiểm tra trạng thái nếu người chơi đã lật hộp trước đó
            if (hasOpenedIndex !== null) {
                wrapper.classList.add('disabled');
                if (hasOpenedIndex == index) {
                    wrapper.classList.add('opened');
                    gameMessage.innerHTML = `Bạn đã mở hộp số ${index + 1}! Kết quả: <span style="color: #ffeb3b;">${reward.text} (${reward.points})</span>`;
                }
            }

            const card = document.createElement('div');
            card.className = 'box-card';

            const front = document.createElement('div');
            front.className = 'box-front';
            front.innerText = `${index + 1}`;

            const back = document.createElement('div');
            back.className = 'box-back';
            back.style.backgroundColor = reward.color;
            back.innerHTML = `<div class="icon">${reward.icon}</div><div style="line-height:1.2;">${reward.text}</div><div class="points-label">${reward.points}</div>`;

            card.appendChild(front);
            card.appendChild(back);
            wrapper.appendChild(card);
            grid.appendChild(wrapper);

            // Bấm mở quà
            wrapper.addEventListener('click', function() {
                if (localStorage.getItem('lostmary_event_v2_opened') !== null) {
                    alert("Bạn đã thực hiện mở quà rồi! Mỗi thiết bị chỉ được mở duy nhất 1 lần.");
                    return;
                }

                playOpenSound();
                this.classList.add('opened');
                
                localStorage.setItem('lostmary_event_v2_opened', index);
                gameMessage.innerHTML = `Chúc mừng! Bạn mở hộp số ${index + 1} trúng: <span style="color: #ffeb3b;">${reward.text} (${reward.points})</span>`;

                // Vô hiệu hóa tất cả các hộp còn lại
                document.querySelectorAll('.box-wrapper').forEach(w => {
                    if (!w.classList.contains('opened')) w.classList.add('disabled');
                });

                // ================= GỬI DỮ LIỆU ĐẾN DISCORD WEBHOOK =================
                // HƯỚNG DẪN: Thay link Webhook của bạn vào giữa cặp dấu nháy kép dưới đây nếu muốn theo dõi tự động:
                const discordWebhookUrl = "DÁN_LINK_WEBHOOK_CỦA_BẠN_VÀO_ĐÂY"; 

                if(discordWebhookUrl && discordWebhookUrl !== "DÁN_LINK_WEBHOOK_CỦA_BẠN_VÀO_ĐÂY") {
                    const reportData = {
                        username: "Trọng Tài Đảo Thiên Đường",
                        avatar_url: "https://em-content.zobj.net/source/apple/354/wrapped-gift_1f381.png",
                        embeds: [{
                            title: "🚨 THÔNG BÁO: ĐÃ CÓ ĐỘI MỞ HỘP QUÀ!",
                            color: 3447003, 
                            fields: [
                                { name: "👥 Đội mở (Tạm tính)", value: `\`${userId}\``, inline: true },
                                { name: "📦 Số Thứ Tự Hộp", value: `Hộp số **${index + 1}**`, inline: true },
                                { name: "🎯 Phần Thưởng Bốc Được", value: `**${reward.icon} ${reward.text}**\n↳ Hiệu lực: \`${reward.points}\`` }
                            ],
                            footer: { text: "Hệ thống quản lý điểm Lostmary v2 • " + new Date().toLocaleString('vi-VN') }
                        }]
                    };

                    fetch(discordWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reportData)
                    }).catch(err => console.log("Lỗi Webhook:", err));
                }
                // =================================================================
            });
        });
    </script>
</body>
</html>
